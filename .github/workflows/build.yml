name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager --install "ndk;28.0.13004108"

      - name: Build libbox from sing-box
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/28.0.13004108
        run: |
          git clone --depth 1 --branch v1.11.8 https://github.com/SagerNet/sing-box.git /tmp/sing-box
          cd /tmp/sing-box
          go install github.com/sagernet/gomobile/cmd/gomobile@v0.1.4
          go install github.com/sagernet/gomobile/cmd/gobind@v0.1.4
          export PATH="$(go env GOPATH)/bin:$PATH"
          gomobile init
          go run ./cmd/internal/build_libbox -target android
          mkdir -p "$GITHUB_WORKSPACE/app/libs"
          cp libbox.aar "$GITHUB_WORKSPACE/app/libs/libbox.aar"
          ls -lh "$GITHUB_WORKSPACE/app/libs/libbox.aar"

      - name: Build release APK
        run: chmod +x gradlew && ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: joyproxy-release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-${{ github.run_number }}
          name: JoyProxy v1.0.0 build ${{ github.run_number }}
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
