name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: false

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager --install "ndk;28.0.13004108"

      - name: Build libbox from sing-box
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/28.0.13004108
        run: |
          git clone --depth 1 --branch v1.13.13 https://github.com/SagerNet/sing-box.git /tmp/sing-box
          cd /tmp/sing-box
          go install github.com/sagernet/gomobile/cmd/gomobile@v0.1.12
          go install github.com/sagernet/gomobile/cmd/gobind@v0.1.12
          export PATH="$(go env GOPATH)/bin:$PATH"
          gomobile init
          go run ./cmd/internal/build_libbox -target android
          mkdir -p "$GITHUB_WORKSPACE/app/libs"
          cp libbox.aar "$GITHUB_WORKSPACE/app/libs/libbox.aar"
          ls -lh "$GITHUB_WORKSPACE/app/libs/libbox.aar"

      - name: Prepare release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "KEYSTORE_BASE64 secret is missing"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > app/joyproxy-release.p12
          ls -lh app/joyproxy-release.p12

      - name: Build release APK
        env:
          KEYSTORE_FILE: joyproxy-release.p12
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: chmod +x gradlew && ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: joyproxy-release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-${{ github.run_number }}
          name: JoyProxy v1.0.1 build ${{ github.run_number }}
          files: app/build/outputs/apk/release/*.apk
          body: |
            JoyProxy 签名版 APK (build ${{ github.run_number }})

            - 已使用 release 证书签名，可直接安装
            - HTTP / SOCKS5 代理
            - 全局 / 白名单 / 黑名单 代理范围
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
